name = "athletic-academia"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""

[env.production]
name = "athletic-academia-prod"
route = "acad-atletica.com/*"
zone_id = ""

[build]
command = "pnpm build"
cwd = "./"
watch_paths = ["client/src/**/*.tsx", "client/src/**/*.ts", "client/src/**/*.css"]

[build.upload]
format = "service-worker"
